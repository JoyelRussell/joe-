<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Game</title>
    <meta name="description" content="A premium, aesthetic neon snake game built using HTML5 Canvas, CSS, and vanilla JavaScript.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>Neon Snake</h1>
            <div class="scores">
                <div class="score-card">
                    <span class="label">SCORE</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-card">
                    <span class="label">HIGH SCORE</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
        </div>
        
        <div class="canvas-container">
            <canvas id="game-board" width="400" height="400"></canvas>
            
            <div id="game-over" class="overlay hidden">
                <h2 class="game-over-title">Game Over!</h2>
                <p>Your Score: <span id="final-score" class="final-score-display">0</span></p>
                <button id="restart-btn">Play Again</button>
            </div>
            
            <div id="start-screen" class="overlay">
                <h2>Ready?</h2>
                <p>Use arrow keys to move</p>
                <button id="start-btn">Start Game</button>
            </div>
        </div>
        
        <div class="controls-hint">
            <span>Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> to control the snake.</span>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
